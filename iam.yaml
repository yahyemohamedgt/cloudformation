AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation for IAM'

Resources:
  MyIAMUser:
    Type: AWS::IAM::User
    Properties:
      UserName: MoeCFN
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  #My IAMGroup:
  MyIAMGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: 'MoeGroup'

  # Attach the user to the group
  UserToGroup:
    Type: AWS::IAM::UserToGroupAddition
    Properties:
      GroupName: !Ref MyIAMGroup
      Users:
        - !Ref MyIAMUser

  # My IAM Role
  MyIAMRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ["ec2.amazonaws.com"]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/PowerUserAccess'      
 
 #s3 custom policy
  MyIAMPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: CustomPolicy

      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
            - s3:GetObject
          Resource: '*'

      Roles:
        - !Ref MyIAMRole

       